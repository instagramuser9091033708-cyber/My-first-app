<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h2>Sunshine Public School</h2>
  <p>Welcome Student 👋</p>
</div>

<!-- GRID -->
<div class="grid">

  <div class="card">👨‍🎓 Profile</div>
  <div class="card">📋 Attendance</div>

  <div class="card">📚 Homework</div>
  <div class="card">📢 Notice Board</div>

  <div class="card">🧾 Fees</div>
  <div class="card">🧑‍🏫 Teachers</div>

  <div class="card">🚌 Transport</div>
  <div class="card">📸 Gallery</div>

</div>

<!-- NOTICE -->
<div class="notice">
  <h3>School Notice ⭐</h3>
  <p>Friday: Zoo Visit 🐘</p>
</div>

<!-- NAVBAR -->
<div class="nav">
  <button>🏠</button>
  <button>📅</button>
  <button>💬</button>
  <button>👤</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
