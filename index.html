<!DOCTYPE html>
<html>
<head>
  <title>Little Diamond Academy</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: #e0e5ec;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 300px;
      padding: 30px;
      border-radius: 20px;
      background: #e0e5ec;
      box-shadow: 10px 10px 20px #a3b1c6,
                  -10px -10px 20px #ffffff;
      text-align: center;
    }

    .logo {
      font-size: 50px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 5px 0;
    }

    p {
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .input-box {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #e0e5ec;
      box-shadow: inset 5px 5px 10px #a3b1c6,
                  inset -5px -5px 10px #ffffff;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #4facfe;
      color: white;
      font-size: 16px;
      box-shadow: 5px 5px 10px #a3b1c6,
                  -5px -5px 10px #ffffff;
    }

    button:active {
      box-shadow: inset 5px 5px 10px #a3b1c6,
                  inset -5px -5px 10px #ffffff;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo">🎓</div>

    <h2>Little Diamond Academy</h2>
    <p>Smart Parent Portal</p>

    <div class="input-box">
      <input type="text" placeholder="Enter phone number">
    </div>

    <a href="dashboard.html">
      <button>Send OTP</button>
    </a>

  </div>

</body>
  </html>
